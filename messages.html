<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages Dashboard - Flidoh Construction</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Barlow', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
        }
        
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 20px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            color: #d4af37;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: #1a1a1a;
            padding: 20px;
            border: 1px solid #d4af37;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-card .number {
            font-size: 2rem;
            color: #d4af37;
            font-weight: bold;
        }
        
        .stat-card .label {
            font-size: 0.85rem;
            color: #999;
            margin-top: 5px;
            text-transform: uppercase;
        }
        
        .messages-container {
            display: grid;
            gap: 20px;
        }
        
        .message-card {
            background: #1a1a1a;
            border-left: 4px solid #d4af37;
            padding: 20px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        
        .message-card:hover {
            background: #222;
            transform: translateX(5px);
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .message-name {
            font-size: 1.2rem;
            color: #d4af37;
            font-weight: 600;
        }
        
        .message-timestamp {
            font-size: 0.85rem;
            color: #666;
        }
        
        .message-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .meta-item {
            font-size: 0.9rem;
        }
        
        .meta-label {
            color: #999;
            font-weight: 600;
            margin-right: 5px;
        }
        
        .meta-value {
            color: #e0e0e0;
        }
        
        .message-text {
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 15px;
            padding: 15px;
            background: #0a0a0a;
            border-radius: 4px;
            font-style: italic;
        }
        
        .no-messages {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .no-messages i {
            font-size: 4rem;
            color: #333;
            margin-bottom: 20px;
            display: block;
        }
        
        .refresh-btn {
            background: #d4af37;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .refresh-btn:hover {
            background: #e5c158;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1><i class="fa-solid fa-envelope"></i> Messages Dashboard</h1>
            <button class="refresh-btn" onclick="location.reload()">
                <i class="fa-solid fa-rotate-right"></i> Refresh
            </button>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="number" id="totalMessages">0</div>
                <div class="label">Total Messages</div>
            </div>
            <div class="stat-card">
                <div class="number" id="todayMessages">0</div>
                <div class="label">Today</div>
            </div>
        </div>
        
        <div id="messagesContent"></div>
    </div>

    <script>
        function getBaseUrl() {
            return window.location.protocol === 'file:' ? 'http://localhost:3300' : '';
        }

        function loadMessages() {
            const baseUrl = getBaseUrl();
            const url = `${baseUrl}/get_messages.php`;
            console.log('Fetching from:', url);

            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    return response.text();
                })
                .then(text => {
                    console.log('Raw response:', text.substring(0, 200));
                    try {
                        const data = JSON.parse(text);
                        displayMessages(data.messages || []);
                        document.getElementById('totalMessages').textContent = data.total || 0;
                        document.getElementById('todayMessages').textContent = data.today || 0;
                    } catch (e) {
                        console.error('JSON parse error:', e);
                        throw new Error('Invalid JSON: ' + text.substring(0, 100));
                    }
                })
                .catch(error => {
                    console.error('Error loading messages:', error);
                    document.getElementById('messagesContent').innerHTML = 
                        '<div class="no-messages"><i class="fa-solid fa-exclamation-triangle"></i><p>Error: ' + error.message + '</p></div>';
                });
        }

        function displayMessages(messages) {
            const container = document.getElementById('messagesContent');
            
            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="no-messages">
                        <i class="fa-solid fa-inbox"></i>
                        <p>No messages yet. When someone submits a quote request, it will appear here.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '<div class="messages-container">' + 
                messages.map(msg => `
                    <div class="message-card">
                        <div class="message-header">
                            <span class="message-name">${msg.firstName} ${msg.lastName}</span>
                            <span class="message-timestamp">${new Date(msg.timestamp).toLocaleString()}</span>
                        </div>
                        <div class="message-meta">
                            <div class="meta-item">
                                <span class="meta-label"><i class="fa-solid fa-envelope"></i> Email:</span>
                                <span class="meta-value"><a href="mailto:${msg.email}" style="color: #d4af37; text-decoration: none;">${msg.email}</a></span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label"><i class="fa-solid fa-briefcase"></i> Service:</span>
                                <span class="meta-value">${msg.service || 'Not specified'}</span>
                            </div>
                        </div>
                        <div class="message-text">
                            "${msg.message}"
                        </div>
                    </div>
                `).join('') + 
                '</div>';
        }

        // Load messages on page load
        loadMessages();
        
        // Auto-refresh every 30 seconds
        setInterval(loadMessages, 30000);
    </script>
</body>
</html>
